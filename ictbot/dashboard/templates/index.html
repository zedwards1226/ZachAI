<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICTBot — {{ symbol }}</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --line: #2a313c;
    --text: #d6dee8;
    --muted: #7d8a99;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #f1c40f;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 13px/1.45 ui-monospace, "SF Mono", Menlo, Consolas, monospace; margin: 0; padding: 16px; }
  h1 { margin: 0 0 4px; font-size: 18px; color: var(--accent); }
  .sub { color: var(--muted); margin-bottom: 16px; font-size: 11px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 12px; }
  .panel h2 { margin: 0 0 8px; font-size: 13px; color: var(--accent); border-bottom: 1px solid var(--line); padding-bottom: 4px; }
  .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .row .k { color: var(--muted); }
  .row .v { font-weight: 600; }
  .ok { color: var(--green); }
  .bad { color: var(--red); }
  .warn { color: var(--yellow); }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; }
  pre { background: #0a0d12; padding: 8px; border-radius: 4px; max-height: 200px; overflow: auto; font-size: 11px; }
  .footer { margin-top: 16px; color: var(--muted); font-size: 10px; }
</style>
</head>
<body>

<h1>ICTBot — {{ symbol }}</h1>
<div class="sub">paper_mode={{ paper_mode }} scan_only={{ scan_only }} • auto-refresh every 5s</div>

<div class="grid">
  <div class="panel">
    <h2>Health</h2>
    <div id="health"></div>
  </div>
  <div class="panel">
    <h2>Today P&amp;L</h2>
    <div id="pnl"></div>
  </div>
  <div class="panel">
    <h2>Open Position</h2>
    <div id="position"></div>
  </div>
  <div class="panel" style="grid-column: span 2;">
    <h2>Today's Setups</h2>
    <div id="setups"></div>
  </div>
  <div class="panel">
    <h2>Edge Stats (per setup)</h2>
    <div id="edge"></div>
  </div>
  <div class="panel" style="grid-column: span 2;">
    <h2>Recent Trades</h2>
    <div id="trades"></div>
  </div>
  <div class="panel">
    <h2>Equity Curve</h2>
    <div id="equity"></div>
  </div>
</div>

<div class="footer">ICTBot dashboard • read-only • never places orders</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => (n === null || n === undefined) ? "—" : (typeof n === "number" ? n.toFixed(2) : n);

function renderHealth(s) {
  const armed = s.arm && s.arm.armed;
  const can = s.can_trade;
  const cdp = s.cdp_9223_ok;
  $("health").innerHTML = `
    <div class="row"><span class="k">CDP :9223</span><span class="v ${cdp?'ok':'bad'}">${cdp ? "ok" : "DOWN"}</span></div>
    <div class="row"><span class="k">paper mode</span><span class="v ${s.paper_mode?'ok':'bad'}">${s.paper_mode}</span></div>
    <div class="row"><span class="k">armed</span><span class="v ${armed?'ok':'warn'}">${armed}</span></div>
    <div class="row"><span class="k">can trade</span><span class="v ${can?'ok':'warn'}">${can}</span></div>
    <div class="row"><span class="k">reason</span><span class="v">${s.can_trade_reason || s.arm?.reason || ""}</span></div>
    <div class="row"><span class="k">cross-bot halt</span><span class="v ${s.cross_bot_halted?'bad':'ok'}">${s.cross_bot_halted}</span></div>
    <div class="row"><span class="k">ORB arm</span><span class="v">${s.orb_arm?.armed ?? "?"}</span></div>
    <div class="row"><span class="k">now ET</span><span class="v">${s.now_et?.slice(0,19)}</span></div>
  `;
}

function renderPnl(s) {
  const today = s.pnl_today;
  const week = s.pnl_week;
  $("pnl").innerHTML = `
    <div class="row"><span class="k">trades today</span><span class="v">${s.trades_today}</span></div>
    <div class="row"><span class="k">P&amp;L today</span><span class="v ${today>=0?'ok':'bad'}">$${fmt(today)}</span></div>
    <div class="row"><span class="k">P&amp;L week</span><span class="v ${week>=0?'ok':'bad'}">$${fmt(week)}</span></div>
    <div class="row"><span class="k">cons. losses</span><span class="v ${s.consecutive_losses>=2?'warn':''}">${s.consecutive_losses}</span></div>
  `;
}

function renderPosition(s) {
  const p = s.open_position;
  if (!p) { $("position").innerHTML = "<div class='row'><span class='k'>flat</span></div>"; return; }
  $("position").innerHTML = `
    <div class="row"><span class="k">side</span><span class="v">${p.side} ${p.qty}x ${p.symbol}</span></div>
    <div class="row"><span class="k">entry</span><span class="v">${fmt(p.entry_price)}</span></div>
    <div class="row"><span class="k">stop</span><span class="v">${fmt(p.stop_price)}</span></div>
    <div class="row"><span class="k">target</span><span class="v">${fmt(p.target_price)}</span></div>
    <div class="row"><span class="k">opened</span><span class="v">${(p.entry_time||"").slice(11,19)}</span></div>
  `;
}

function renderSetups(d) {
  if (!d.setups?.length) { $("setups").innerHTML = "<div class='row'><span class='k'>no setups detected today</span></div>"; return; }
  let html = "<table><tr><th>time</th><th>name</th><th>side</th><th>zone</th><th>SL</th><th>TP</th><th>R:R</th><th>conf</th><th>fired</th></tr>";
  for (const s of d.setups) {
    html += `<tr><td>${(s.detected_time||"").slice(11,19)}</td><td>${s.setup_name}</td><td>${s.bias}</td><td>${fmt(s.entry_zone_low)}-${fmt(s.entry_zone_high)}</td><td>${fmt(s.stop_price)}</td><td>${fmt(s.target_price)}</td><td>${fmt(s.rr)}</td><td>${s.confidence}</td><td>${s.triggered?'yes':'no'}</td></tr>`;
  }
  $("setups").innerHTML = html + "</table>";
}

function renderTrades(d) {
  if (!d.trades?.length) { $("trades").innerHTML = "<div class='row'><span class='k'>no trades yet</span></div>"; return; }
  let html = "<table><tr><th>entry time</th><th>side</th><th>entry</th><th>exit</th><th>P&amp;L $</th><th>R</th><th>reason</th></tr>";
  for (const t of d.trades) {
    const cls = (t.pnl_dollars||0) >= 0 ? 'ok' : 'bad';
    html += `<tr><td>${(t.entry_time||"").slice(0,19).replace('T',' ')}</td><td>${t.side}</td><td>${fmt(t.entry_price)}</td><td>${fmt(t.exit_price)}</td><td class="${cls}">${fmt(t.pnl_dollars)}</td><td>${fmt(t.pnl_r)}</td><td>${t.exit_reason||"-"}</td></tr>`;
  }
  $("trades").innerHTML = html + "</table>";
}

function renderEquity(d) {
  if (!d.curve?.length) { $("equity").innerHTML = "<div class='row'><span class='k'>no closed trades</span></div>"; return; }
  const last = d.curve[d.curve.length-1];
  let html = `<div class="row"><span class="k">cum P&amp;L</span><span class="v ${last.cum_pnl>=0?'ok':'bad'}">$${fmt(last.cum_pnl)}</span></div>`;
  html += "<table><tr><th>date</th><th>cum $</th></tr>";
  for (const r of d.curve.slice(-10)) {
    html += `<tr><td>${r.date}</td><td>$${fmt(r.cum_pnl)}</td></tr>`;
  }
  $("equity").innerHTML = html + "</table>";
}

function renderEdge(d) {
  if (!d.stats?.length) { $("edge").innerHTML = "<div class='row'><span class='k'>no closed trades yet</span></div>"; return; }
  let html = "<table><tr><th>setup</th><th>n</th><th>win%</th><th>avg R</th><th>$ total</th></tr>";
  for (const s of d.stats) {
    html += `<tr><td>${s.setup_name}</td><td>${s.trades}</td><td>${(s.win_rate*100).toFixed(0)}%</td><td>${fmt(s.avg_r)}</td><td>$${fmt(s.total_pnl)}</td></tr>`;
  }
  $("edge").innerHTML = html + "</table>";
}

async function refresh() {
  try {
    const [s, st, tr, eq, ed] = await Promise.all([
      fetch("/api/status").then(r=>r.json()),
      fetch("/api/today-setups").then(r=>r.json()),
      fetch("/api/recent-trades").then(r=>r.json()),
      fetch("/api/equity-curve").then(r=>r.json()),
      fetch("/api/edge-stats").then(r=>r.json()),
    ]);
    renderHealth(s); renderPnl(s); renderPosition(s);
    renderSetups(st); renderTrades(tr); renderEquity(eq); renderEdge(ed);
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>

</body>
</html>
